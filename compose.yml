services:
  # This service will compile the source code before initializing
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # The database URL for use in containers
      DATABASE_URL: postgres://${POSTGRES_USER:-db}:${POSTGRES_PASSWORD:-pass}@postgres:5432/${POSTGRES_DB:-fixfiction}
    volumes:
      # The .env file at project root
      - ./.env:/app/.env:ro
      # Persist application logs out-of-container
      - ${FIXFICTION_LOGS_DIR:-./logs}:/app/logs
    ports:
      - "7669:7669"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  # This service uses a prebuilt application binary
  app-prebuilt:
    profiles:
      - prebuilt
    build:
      context: .
      dockerfile: Dockerfile.prebuilt
    environment:
      # The database URL for use in containers
      DATABASE_URL: postgres://${POSTGRES_USER:-db}:${POSTGRES_PASSWORD:-pass}@postgres:5432/${POSTGRES_DB:-fixfiction}
    volumes:
      # The .env file at project root
      - ./.env:/app/.env:ro
      # Persist application logs out-of-container
      - ${FIXFICTION_LOGS_DIR:-./logs}:/app/logs
      # Assumed location of the application binary
      - ./target/release/fixfiction:/usr/local/bin/fixfiction:ro
    ports:
      - "7669:7669"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  # It's postgres!
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-db}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pass}
      POSTGRES_DB: ${POSTGRES_DB:-fixfiction}
    volumes:
      # Persist PostgreSQL data in a host bind mount
      - ${POSTGRES_DATA_DIR:-./postgres-data}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
