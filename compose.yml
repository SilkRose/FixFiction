services:
  # This service will compile the source code before initializing
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      # The .env file at project root
      - ./.env:/app/.env:ro
    ports:
      - "7669:7669"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  # This service uses a prebuilt application binary
  app-prebuilt:
    profiles:
      - prebuilt
    build:
      context: .
      dockerfile: Dockerfile.prebuilt
    volumes:
      # The .env file at project root
      - ./.env:/app/.env:ro
      # Assumed location of the application binary
      - ./target/release/fixfiction:/usr/local/bin/fixfiction:ro
    ports:
      - "7669:7669"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  # It's postgres!
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-db}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pass}
      POSTGRES_DB: ${POSTGRES_DB:-fixfiction}
    volumes:
      - fixfiction-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

volumes:
  fixfiction-postgres-data:
